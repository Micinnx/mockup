<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Fi - Login | SIAKAD SMK</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="hifi-login-container">
        <div class="hifi-login-grid">
            <div class="hifi-login-left">
                <div class="hifi-brand">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>SMKS-TI PGRI 11</h1>
                    <h2>SERPONG</h2>
                    <p>Sistem Informasi Akademik<br></p>
                </div>
                <div class="hifi-features">
                    <div class="feature">
                        <i class="fas fa-chart-line"></i>
                        <span>Pantau Nilai & Raport</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Jadwal Pelajaran</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-receipt"></i>
                        <span>Informasi Tagihan</span>
                    </div>
                </div>
            </div>
            <div class="hifi-login-right">
                <div class="hifi-login-card">
                    <h3>Selamat Datang</h3>
                    <p>Silakan masuk dengan NIS / NISN Anda</p>
                    
                    <form id="loginForm">
                        <div class="hifi-input-group">
                            <label><i class="fas fa-id-card"></i> NIS / NISN</label>
                            <input type="text" id="nis" placeholder="12TKJ1001" autocomplete="off">
                        </div>
                        <div class="hifi-input-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="password" placeholder="Masukkan password">
                            <i class="fas fa-eye-slash toggle-password"></i>
                        </div>
                        <button type="button" id="loginBtn" class="hifi-btn-login">
                            <i class="fas fa-sign-in-alt"></i> Masuk
                        </button>
                        <div class="hifi-links">
                            <a href="#"><i class="fas fa-question-circle"></i> Lupa Password?</a>
                        </div>
                    </form>
                    
                    <div class="hifi-demo-info">
                        <i class="fas fa-info-circle"></i>
                        <span>Demo Akses: NIS <strong>11/2020/0390</strong> | Password <strong>12TKJ1001</strong></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
